<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cek Harga Honda Pro - GitHub Pages</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #d32f2f; margin-top: 0; }
        textarea { width: 100%; height: 100px; padding: 12px; border-radius: 6px; border: 1px solid #ccc; font-family: monospace; box-sizing: border-box; }
        
        .control-group { margin-top: 15px; display: flex; flex-direction: column; gap: 10px; background: #f9f9f9; padding: 15px; border-radius: 8px; border: 1px solid #e0e0e0; }
        .checkbox-label { display: flex; align-items: center; gap: 8px; font-weight: bold; cursor: pointer; user-select: none; }
        .checkbox-label input { width: 18px; height: 18px; cursor: pointer; }
        
        .input-group { display: flex; align-items: center; gap: 10px; margin-left: 26px; transition: opacity 0.3s; }
        .input-group label { font-weight: bold; color: #444; }
        .input-group input { width: 80px; padding: 8px; border: 1px solid #ccc; border-radius: 5px; font-weight: bold; text-align: center; }
        .input-group input:disabled { background: #e9ecef; color: #6c757d; cursor: not-allowed; }
        
        .btn-container { margin: 15px 0; display: flex; gap: 10px; }
        button { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-search { background: #d32f2f; color: white; }
        .btn-search:hover { background: #b71c1c; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #d32f2f; color: white; padding: 12px; text-align: left; font-size: 14px; }
        td { border-bottom: 1px solid #ddd; padding: 12px; font-size: 14px; }
        tr:nth-child(even) { background-color: #fafafa; }
        
        .status-aktif { color: #2e7d32; font-weight: bold; background: #e8f5e9; padding: 3px 8px; border-radius: 4px; display: inline-block; }
        .status-tidak { color: #d32f2f; font-weight: bold; background: #ffebee; padding: 3px 8px; border-radius: 4px; display: inline-block; }
        .harga-jual { background: #e8f5e9; font-weight: bold; color: #1b5e20; }
    </style>
</head>
<body>

<div class="container">
    <h2>Multi-Check Part Honda & Status</h2>
    <textarea id="multiCodes" placeholder="Masukkan Kode Part (Satu per baris)..."></textarea>
    
    <div class="control-group">
        <label class="checkbox-label">
            <input type="checkbox" id="useMargin" onchange="toggleMarginInput()"> Gunakan Margin Harga Jual
        </label>
        
        <div class="input-group" id="marginWrapper" style="opacity: 0.5;">
            <label for="marginPercent">Persen Margin:</label>
            <input type="number" id="marginPercent" value="10" min="0" max="500" disabled> <span>%</span>
        </div>
    </div>

    <div class="btn-container">
        <button class="btn-search" onclick="startBulkSearch()">Cari & Hitung</button>
    </div>
    <div id="statusInfo" style="margin-bottom: 10px; font-style: italic;"></div>

    <table id="resultTable">
        <thead>
            <tr>
                <th>No</th>
                <th>Kode Part</th>
                <th>Nama Part</th>
                <th>Harga HET (Polos)</th>
                <th>Status</th>
                <th id="headerHargaJual">Harga Jual (+0%)</th>
            </tr>
        </thead>
        <tbody id="resultBody"></tbody>
    </table>
</div>

<script>
function toggleMarginInput() {
    const checkbox = document.getElementById('useMargin');
    const input = document.getElementById('marginPercent');
    const wrapper = document.getElementById('marginWrapper');
    
    if (checkbox.checked) {
        input.disabled = false;
        wrapper.style.opacity = "1";
    } else {
        input.disabled = true;
        wrapper.style.opacity = "0.5";
    }
}

function formatRupiah(angka) {
    return new Intl.NumberFormat('id-ID').format(Math.ceil(angka));
}

async function fetchPartData(kd_part) {
    const cleanCode = kd_part.toUpperCase().trim();
    const targetUrl = `https://h3.indako.id/site/cekhargapartindex?TblmstpartSearch%5Bvidpart%5D=${encodeURIComponent(cleanCode)}&TblmstpartSearch%5Bvpartdesc%5D=&TblmstpartSearch%5Bmhetpart%5D=&TblmstpartSearch%5Bvstatus%5D=`;
    
    const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`;

    const response = await fetch(proxyUrl);
    if (!response.ok) throw new Error("Gagal mengambil data dari proxy");
    
    const rawHtml = await response.text();

    if (!rawHtml || rawHtml.includes('No results found') || rawHtml.includes('Tidak ada data')) {
        return "NOT_FOUND";
    }

    const parser = new DOMParser();
    const doc = parser.parseFromString(rawHtml, 'text/html');
    const rows = doc.querySelectorAll('table tbody tr');
    let foundRowHtml = null;

    for (const row of rows) {
        if (row.textContent.toUpperCase().includes(cleanCode)) {
            foundRowHtml = row.innerHTML;
            break;
        }
    }

    return foundRowHtml ? foundRowHtml : "NOT_FOUND";
}

async function startBulkSearch() {
    const input = document.getElementById('multiCodes').value;
    const resultBody = document.getElementById('resultBody');
    const statusInfo = document.getElementById('statusInfo');
    
    const isMarginChecked = document.getElementById('useMargin').checked;
    const marginPercent = isMarginChecked ? (parseFloat(document.getElementById('marginPercent').value) || 0) : 0;
    
    document.getElementById('headerHargaJual').innerText = `Harga Jual (+${marginPercent}%)`;
    
    const codes = input.split('\n').map(c => c.trim()).filter(c => c.length > 0);
    if (codes.length === 0) return alert("Isi kode part!");

    resultBody.innerHTML = ""; 
    let count = 1;

    for (const code of codes) {
        statusInfo.innerHTML = `Memproses: <strong>${code}</strong>...`;
        
        try {
            const rawHtml = await fetchPartData(code);
            
            if (rawHtml === "NOT_FOUND") {
                resultBody.innerHTML += `<tr><td>${count}</td><td>${code}</td><td colspan="5" style="color:orange; font-weight:bold;">Tidak Ditemukan</td></tr>`;
            } else {
                const tempTable = document.createElement('tr');
                tempTable.innerHTML = rawHtml;
                const cols = tempTable.querySelectorAll('td');

                // Validasi jumlah kolom respon web Indako
                if (cols.length >= 4) {
                    const kodePartText = cols[1].innerText.trim();
                    const namaPartText = cols[2].innerText.trim();
                    const hargaTeks = cols[3].innerText.trim();
                    
                    const hargaDasar = parseFloat(hargaTeks.replace(/\./g, '').replace(',', '.'));
                    const hargaJual = hargaDasar * (1 + (marginPercent / 100));

                    // --- DETEKSI STATUS ---
                    const statusCell = cols[0];
                    const statusHtmlRaw = statusCell.innerHTML.toLowerCase();
                    const statusTextRaw = statusCell.innerText.trim().toUpperCase();
                    
                    let statusHtml = "";
                    
                    // Cek indikasi Tidak Aktif (silang, remove, danger, atau teks TIDAK)
                    if (
                        statusHtmlRaw.includes('glyphicon-remove') || 
                        statusHtmlRaw.includes('fa-times') || 
                        statusHtmlRaw.includes('text-danger') || 
                        statusHtmlRaw.includes('danger') || 
                        statusTextRaw.includes('TIDAK') ||
                        statusTextRaw.includes('NON')
                    ) {
                        statusHtml = '<span class="status-tidak">Tidak Aktif</span>';
                    } 
                    // Cek indikasi Aktif (centang, ok, check, success, atau teks AKTIF)
                    else if (
                        statusHtmlRaw.includes('glyphicon-ok') || 
                        statusHtmlRaw.includes('fa-check') || 
                        statusHtmlRaw.includes('text-success') || 
                        statusHtmlRaw.includes('success') || 
                        statusHtmlRaw.includes('checked') || 
                        statusTextRaw.includes('AKTIF') || 
                        statusTextRaw === '' // Default Yii Framework jika hanya ikon tanpa teks baku
                    ) {
                        statusHtml = '<span class="status-aktif">Aktif</span>';
                    } 
                    // Backup / Fallback (Jika indikator tak dikenal tapi element tidak kosong)
                    else {
                        statusHtml = `<span class="status-aktif">${statusCell.innerHTML}</span>`;
                    }

                    resultBody.innerHTML += `
                        <tr>
                            <td>${count}</td>
                            <td>${kodePartText}</td>
                            <td>${namaPartText}</td>
                            <td>Rp ${formatRupiah(hargaDasar)}</td> 
                            <td>${statusHtml}</td>
                            <td class="harga-jual">Rp ${formatRupiah(hargaJual)}</td>
                        </tr>`;
                } else {
                    resultBody.innerHTML += `<tr><td>${count}</td><td>${code}</td><td colspan="5" style="color:orange">Format Baris Tidak Sesuai</td></tr>`;
                }
            }
        } catch (error) {
            console.error(error);
            resultBody.innerHTML += `<tr><td>${count}</td><td>${code}</td><td colspan="5" style="color:red; font-weight:bold;">Error Jaringan / Server Padat</td></tr>`;
        }
        
        count++;
        await new Promise(r => setTimeout(r, 500)); // jeda 0.5 detik per hit anti-blokir
    }
    statusInfo.innerHTML = "<strong>Selesai.</strong>";
}
</script>
</body>
</html>
